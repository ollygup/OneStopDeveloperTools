<svg viewBox="110 90 180 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .node { fill: #2c3e50; }
      .line { stroke: #2c3e50; stroke-width: 2; fill: none; }
      .center { fill: #3498db; }
    </style>
  </defs>
  
  <!-- Central hub -->
  <circle class="center" cx="200" cy="200" r="24"/>
  
  <!-- Connection lines -->
  <line class="line" x1="200" y1="200" x2="140" y2="140"/>
  <line class="line" x1="200" y1="200" x2="260" y2="140"/>
  <line class="line" x1="200" y1="200" x2="140" y2="260"/>
  <line class="line" x1="200" y1="200" x2="260" y2="260"/>
  <line class="line" x1="200" y1="200" x2="200" y2="120"/>
  <line class="line" x1="200" y1="200" x2="200" y2="280"/>
  
  <!-- Outer nodes -->
  <circle class="node" cx="140" cy="140" r="16"/>
  <circle class="node" cx="260" cy="140" r="16"/>
  <circle class="node" cx="140" cy="260" r="16"/>
  <circle class="node" cx="260" cy="260" r="16"/>
  <circle class="node" cx="200" cy="120" r="16"/>
  <circle class="node" cx="200" cy="280" r="16"/>
</svg>
