<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; frame-src 'none'; object-src 'none'">
<title>Bench — local dev tools</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell">

  <header class="topbar">
    <button class="menu-toggle" id="menu-toggle" type="button" aria-label="Open tools menu" aria-expanded="false" aria-controls="sidebar">
      <span class="menu-toggle-bar"></span>
      <span class="menu-toggle-bar"></span>
      <span class="menu-toggle-bar"></span>
    </button>
    <div class="topbar-brand">
      <span class="brand-mark">▣</span>
      <span>One-Stop Developer Tools</span>
    </div>
    <div class="topbar-net" title="No requests ever leave this page">
      <span class="net-dot"></span>
    </div>
  </header>

  <div class="backdrop" id="backdrop"></div>

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <span class="brand-mark">▣</span>
      <span class="brand-name">Toolbox</span>
    </div>

    <div class="net-indicator" title="No requests ever leave this page">
      <span class="net-dot"></span>
      <span>Questo è il miglior HTML, CSS e JS di tutti i tempi.</span>
    </div>

    <nav class="accordion" id="accordion"></nav>

    <div class="sidebar-foot">
      <span>Be grateful it runs locally.</span>
    </div>
  </aside>

  <main class="content" id="content">
    <div class="empty-state" id="empty-state">
      <p class="empty-title">Select a tool</p>
      <p class="empty-sub">Just in case you are unaware, clicking on a tool will, in fact, open the tool you clicked.</p>
    </div>
  </main>

</div>

<script src="js/registry.js"></script>
<script src="js/vendor-md5.js"></script>
<script src="tools/hashing.js"></script>
<script src="tools/jwt.js"></script>
<script src="tools/compare.js"></script>
<script src="js/app.js"></script>
</body>
</html>
